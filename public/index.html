<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebSocket Chat</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(
          circle at top,
          #1b1b2e 0%,
          #090a10 45%,
          #020204 100%
        );
        color: #f7f7fb;
      }

      .chat-shell {
        width: min(100%, 760px);
        min-height: 680px;
        background: rgba(18, 26, 44, 0.94);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 28px;
        box-shadow: 0 40px 80px rgba(0, 0, 0, 0.22);
        overflow: hidden;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      .chat-header {
        padding: 22px 26px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .chat-header h1 {
        margin: 0;
        font-size: 1.18rem;
        letter-spacing: 0.04em;
      }

      .chat-header p {
        margin: 0;
        color: #a9b1d4;
        font-size: 0.95rem;
      }

      .chat-window {
        padding: 20px 24px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        overflow-y: auto;
        scroll-behavior: smooth;
      }

      .message {
        max-width: 78%;
        padding: 14px 16px;
        border-radius: 18px;
        line-height: 1.5;
        word-break: break-word;
      }

      .message.user {
        align-self: flex-end;
        background: linear-gradient(180deg, #4b6cb7 0%, #182848 100%);
        color: #fff;
      }

      .message.server {
        align-self: flex-start;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #e7eaf4;
      }

      .message small {
        display: block;
        margin-top: 8px;
        opacity: 0.72;
        font-size: 0.82rem;
      }

      /* Inline three-dot typing indicator (WhatsApp-like) */
      .typing {
        align-self: flex-start;
        padding: 0;
        margin: 0;
        background: transparent;
        border: none;
      }

      .typing-bubble {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 0;
        background: transparent;
      }

      .typing-dot {
        width: 10px;
        height: 10px;
        background: rgba(231,234,244,0.95);
        border-radius: 50%;
        transform: translateY(0);
        animation: typing-dot 1s infinite ease-in-out;
      }

      .typing-dot:nth-child(1) { animation-delay: 0s; }
      .typing-dot:nth-child(2) { animation-delay: 0.12s; }
      .typing-dot:nth-child(3) { animation-delay: 0.24s; }

      @keyframes typing-dot {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.7; }
        40% { transform: translateY(-6px); opacity: 1; }
      }

      .input-panel {
        padding: 18px 24px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        display: grid;
        gap: 12px;
      }

      .input-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
      }

      .input-row input {
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
        color: #f8fbff;
        padding: 14px 16px;
        font-size: 1rem;
      }

      .input-row input:focus {
        outline: 2px solid rgba(75, 108, 183, 0.32);
      }

      .input-row button {
        border: none;
        border-radius: 14px;
        padding: 0 22px;
        color: #fff;
        background: #5c7ef8;
        cursor: pointer;
        font-weight: 600;
        transition:
          transform 0.18s ease,
          background 0.18s ease;
      }

      .input-row button:hover {
        transform: translateY(-1px);
        background: #2f53d9;
      }

      .hint {
        color: #9aa5c4;
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body>
    <main class="chat-shell">
      <section class="chat-header">
        <div>
          <h1>Socket Chat</h1>
          <p>Type a message and press Send to continue the conversation.</p>
        </div>
        <div class="hint" id="statusHint">Connected</div>
        <div class="hint" id="typingIndicator" style="display: none;"></div>
      </section>

      <section class="chat-window" id="chatWindow" aria-live="polite"></section>

      <section class="input-panel">
        <div class="input-row">
          <input
            id="messageInput"
            type="text"
            placeholder="Write a message..."
            autocomplete="off"
          />
          <button id="sendButton" type="button">Send</button>
        </div>
      </section>
    </main>
    <script src="/socket.io/socket.io.js"></script>

    <script>
      const socket = io();

      const chatWindow = document.getElementById("chatWindow");
      const messageInput = document.getElementById("messageInput");
      const sendButton = document.getElementById("sendButton");
      const typingIndicator = document.getElementById("typingIndicator");
      let typingTimeout = null;

      // Debounce function
      function debounce(func, delay) {
        let timeoutId;
        return function (...args) {
          clearTimeout(timeoutId);
          timeoutId = setTimeout(() => func(...args), delay);
        };
      }

      function addMessage(text, sender) {
        const message = document.createElement("article");

        message.className = `message ${sender}`;

        message.innerHTML = `
      <div>${text}</div>
      <small>${sender === "user" ? "You" : "Server"}</small>
    `;

        chatWindow.append(message);
        chatWindow.scrollTop = chatWindow.scrollHeight;
      }

      function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        addMessage(text, "user");
        socket.emit("user:message", {
          text,
        });
        messageInput.value = "";
        messageInput.focus();
      }

      // Debounced typing handler
      const debouncedTyping = debounce(() => {
        socket.emit("user:typing");
      }, 300);

      messageInput.addEventListener("input", () => {
        if (messageInput.value.trim()) {
          debouncedTyping();
        }
      });

      socket.on("server:message", (data) => {
        addMessage(data.text, "server");
      });

      socket.on("server:user:typing", (data) => {
        const name = data && data.name ? data.name : "Someone";
        // Insert a left-aligned typing bubble into the chat window
        const existing = document.getElementById("typingBubble");
        if (!existing) {
          const bubble = document.createElement("article");
          bubble.id = "typingBubble";
          bubble.className = "typing";
          bubble.innerHTML = `
            <div class="typing-bubble">
              <span class="typing-dot"></span>
              <span class="typing-dot"></span>
              <span class="typing-dot"></span>
            </div>
          `;
          chatWindow.append(bubble);
          chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        if (typingTimeout) clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
          const el = document.getElementById("typingBubble");
          if (el) el.remove();
          typingTimeout = null;
        }, 1000);
      });

      sendButton.addEventListener("click", sendMessage);

      messageInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          sendMessage();
        }
      });
    </script>
  </body>
</html>
